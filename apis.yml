name: Brookfield Asset Management
description: >-
  Brookfield Asset Management (NYSE: BAM, TSX: BAM) is a leading global
  alternative asset manager with over $1 trillion in assets under management
  and approximately $614 billion in fee-bearing capital. BAM describes itself
  as "a pure-play, asset-light investment manager with earnings derived from
  stable, predictable fee-related revenue." The publicly listed manager was
  formed in December 2022 when it was spun out of Brookfield Corporation (NYSE:
  BN), which remains the majority shareholder. BAM operates across five
  investment verticals — Renewable Power & Transition, Infrastructure, Real
  Estate, Private Equity, and Credit — and adjacent Insurance Solutions
  capability is delivered through Brookfield Wealth Solutions, a sister
  business within the broader Brookfield ecosystem. BAM does not publish a
  public developer API program. Institutional Limited Partners, financial
  intermediaries, distribution platforms, and portfolio companies interact
  with the firm through private, authentication-gated investor portals, PDF
  reporting (10-K, supplemental, letters to shareholders), data feeds from
  fund administrators, and the investor-relations website at
  bam.brookfield.com.
