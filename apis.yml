  - type: Absences
    data:
      - name: No Public Developer API
        description: BAM does not publish a public REST/GraphQL/OpenAPI developer API for investors, distribution platforms, or portfolio companies.
      - name: No Public GitHub Repositories
        description: A `github.com/brookfield` organization exists but exposes no public repositories and no public members. No OpenAPI specs, SDKs, CLIs, or tools are published.
      - name: No Public RSS Feed
        description: Press release and shareholder letter pages are HTML / PDF only; no `feed.xml` or Atom feed was discovered.
      - name: No Public Webhook or Event Bus
        description: All investor and portfolio interactions are file/email or portal driven; no public eventing surface.
      - name: No Public Pricing Surface
        description: BAM's commercial surface is fund management/performance fees set in private LP agreements; there is no public price list.
