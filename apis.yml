        description: Quarterly results presentations, annual Investor Day presentation, and supplemental decks.
      - name: Sustainability Reporting
        description: Annual BAM Sustainability Report and Sustainability Policy; supports net-zero by 2050.
      - name: Email and Investor Alerts
        description: Email subscription via contact & alerts page; no documented push API or webhook surface.
      - name: SEC EDGAR Filings
        description: Form 10-K, 10-Q, 8-K, proxy and other filings available via SEC EDGAR and the BAM SEC filings page.
  - type: Distribution
    data:
      - name: Institutional LPs
        description: Direct mandates from pension funds, sovereign wealth funds, endowments, foundations, insurance companies, and family offices.
      - name: Private Wealth
        description: Distribution into accredited and high-net-worth channels through registered investment advisors and broker-dealers; perpetual products including BREIT-style vehicles.
      - name: Insurance Channel
        description: Asset-management mandates for Brookfield Wealth Solutions' insurance general account and third-party insurers.
      - name: Wealth Distribution Platforms
        description: Alternative-investment marketplaces and feeder-fund platforms (e.g., iCapital, CAIS) used industry-wide for advisor distribution of private alternatives.
