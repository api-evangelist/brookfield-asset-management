  - type: Verticals
    data:
      - name: Renewable Power & Transition
        description: >-
          "We are an owner, operator and developer of one of the world's largest
          clean energy portfolios." Brookfield's largest global transition
          platform manages $142 billion in AUM across roughly 46,000 MW of
          generating capacity at 7,000+ power-generating facilities, including
          ~8,300 MW hydro, ~14,200 MW operating solar (with ~128,900 MW under
          development), ~17,300 MW operating wind (with ~44,300 MW under
          development), and ~5,800 MW distributed energy and storage. Adjacent
          sustainable-solutions strategies include carbon capture, renewable
          natural gas, and nuclear services. Listed affiliate: Brookfield
          Renewable Partners (BEP / BEPC). Flagship private funds include the
          Brookfield Global Transition Fund (BGTF I and BGTF II).
        url: https://www.brookfield.com/our-businesses/renewable-power-transition
      - name: Infrastructure
        description: >-
          "We are one of the largest investors in global infrastructure, with
          over 125 years of experience." The Infrastructure vertical manages
          $255 billion in AUM across four sectors: Utilities (natural gas
          pipelines, electricity transmission), Transport (rail, toll roads,
          ports and terminals), Midstream (pipelines, storage, processing), and
          Data (telecom towers, fiber optic cable, data centers). Notable
          scale: 308,000 operational telecom sites, 77,000 km of fiber optic
          cable, and 150 data centers globally. Listed affiliate: Brookfield
          Infrastructure Partners (BIP / BIPC). Flagship private fund family:
          Brookfield Infrastructure Fund (BIF I through BIF V).
        url: https://www.brookfield.com/our-businesses/infrastructure
      - name: Real Estate
        description: >-
          "Acquire high-quality assets, invest on a value basis, and enhance
          value through active management." The Real Estate vertical manages
          $277 billion in AUM across Housing, Logistics, Hospitality, Science &
          Innovation, Office, and Retail sectors. Scale includes 500M+
          commercial square feet, ~24,000 operating employees, 80,000
          multifamily units, and 176 full-service hotel properties across 17
          countries. Flagship private fund family: Brookfield Strategic Real
          Estate Partners (BSREP I through BSREP V).
        url: https://www.brookfield.com/our-businesses/real-estate
      - name: Private Equity
        description: >-
          "We are value investors focused on delivering operational
          transformation in industrials and essential business services." The
          Private Equity vertical manages $160 billion in AUM with 150
          investment professionals and approximately 137,000 operating
          employees across portfolio companies. Sectors include Industrials
          (advanced batteries, thermal management, returnable packaging, lab
          testing consumables) and Essential Business Services (BPO, financial
          services, software, technology services). Notable portfolio
          companies: Clarios, CDK Global, GEMS Education, Everise, Modulaire,
          DexKo Global. Listed affiliate: Brookfield Business Partners (BBU /
          BBUC). Flagship private fund family: Brookfield Capital Partners
          (BCP).
        url: https://www.brookfield.com/our-businesses/private-equity
      - name: Credit
        description: >-
          "As one of the world's largest credit investors, we harness the power
          of our global network to deliver tailored solutions across the credit
          spectrum." The Credit vertical manages $365 billion in AUM with 700+
          professionals and relationships with 600+ sponsors. The platform is
          anchored by Brookfield's 2019 acquisition of a majority stake in
          Oaktree Capital Management and extends across five strategy
          categories: Real Estate Credit, Infrastructure & Renewable Energy
          Credit, Asset-Based Credit (including music royalties, aviation
          financing, fund finance), Corporate Credit (direct lending, private
          structured investment grade), and Liquid Credit (investment-grade and
          high-yield debt). Specialty-manager investments expand capabilities
          across LCM Partners, Primary Wave Music, Castlelake, Angel Oak, and
          others.
        url: https://www.brookfield.com/our-businesses/credit
      - name: Insurance Solutions (Brookfield Wealth Solutions)
        description: >-
          "We focus on securing the financial futures of individuals and
          institutions through a range of retirement services, wealth
          protection products and tailored capital solutions." Insurance
          capability is operated by Brookfield Wealth Solutions (NYSE: BNT) —
          a sister business within the broader Brookfield ecosystem rather
          than a direct vertical of BAM — managing $143 billion in insurance
          assets with ~4,000 operating employees, A- or better financial
          ratings, and $20 billion in total group capital. Operating
          subsidiaries include American Equity, American National Insurance,
          Argo Group, Blumont Annuity, Just Group, and Farm Family Insurance.
          BAM and BNT are intertwined: BAM provides asset-management services
          to BNT's insurance general account.
        url: https://www.brookfield.com/our-businesses/insurance-solutions
  - type: Funds
